<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guest list — Amabile</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#E74529">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--red:#E74529;--cream:#FFF3E0;--lime:#C6FF4D;--ink:#2a1207}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);background:#FBFAEB;padding:26px 16px 70px}
.wrap{max-width:500px;margin:0 auto}
h1{font-family:"Bagel Fat One",cursive;font-size:30px;color:var(--red);line-height:1;margin-bottom:6px}
.sub{color:#7a5c49;margin-bottom:20px;font-size:15px}
.venue-tag{display:inline-block;background:var(--ink);color:var(--cream);font-weight:700;border-radius:999px;padding:7px 15px;font-size:13px;margin-bottom:18px}
label{display:block;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:12px;color:#6a4634;margin:14px 0 6px}
input{width:100%;padding:14px 16px;border:3px solid var(--ink);border-radius:12px;font-family:inherit;font-size:16px;background:#fff;color:var(--ink)}
input:focus{outline:none;box-shadow:0 0 0 3px rgba(231,69,41,.3)}
.copy{margin-top:24px;width:100%;cursor:pointer;border:0;background:var(--red);color:var(--cream);font-family:"Bagel Fat One",cursive;font-size:19px;padding:17px;border-radius:999px;box-shadow:5px 5px 0 var(--ink);transition:transform .12s}
.copy:hover{transform:translate(-2px,-2px)}
.copy:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.copy:disabled{opacity:.6;cursor:default;transform:none}
.hint{margin-top:18px;font-size:13px;color:#6a5343;background:#fff;border:2px solid rgba(42,18,7,.14);border-radius:12px;padding:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Guest list</h1>
  <div class="sub">Add this to your booking confirmation so the booker can lock in who's coming. No app, no signup.</div>
  <div id="venueTag" class="venue-tag" style="display:none"></div>

  <div id="venueField">
    <label for="venue">Venue name</label>
    <input id="venue" placeholder="e.g. Bamboa" autocomplete="off">
  </div>

  <label for="guest">Guest's name</label>
  <input id="guest" placeholder="e.g. Emilia" autocomplete="off">

  <label for="when">When (date / time)</label>
  <input id="when" placeholder="e.g. Sat, 8pm" autocomplete="off">

  <button class="copy" id="copyBtn">Copy message</button>

  <div class="hint">Paste it straight into your WhatsApp confirmation. The guest taps it, hits “Round up the crew”, and shares it to their group chat.</div>
</div>

<script>
function qp(k){return new URLSearchParams(location.search).get(k)||"";}
function slug(s){return (s||"").toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");}
var lockedVenue=qp("v")||qp("venue");
var venueInput=document.getElementById("venue");
if(lockedVenue){
  document.getElementById("venueField").style.display="none";
  var tag=document.getElementById("venueTag");tag.style.display="inline-block";tag.textContent="📍 "+lockedVenue;
}
function venueName(){return (lockedVenue||venueInput.value.trim());}
var guest=document.getElementById("guest"),when=document.getElementById("when"),btn=document.getElementById("copyBtn");

function longLink(){
  var p=["invite=1","v=linkup"],v=venueName();
  if(guest.value.trim())p.push("host="+encodeURIComponent(guest.value.trim()));
  if(when.value.trim())p.push("when="+encodeURIComponent(when.value.trim()));
  if(v)p.push("where="+encodeURIComponent(v));
  p.push("utm_source=venue","utm_medium=reservation");
  if(v)p.push("utm_campaign="+encodeURIComponent(slug(v)));
  return "https://www.amabiledirosa.com/?"+p.join("&");
}
function shortLink(){
  return fetch("/.netlify/functions/shorten",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({host:guest.value.trim(),when:when.value.trim(),where:venueName(),venue:venueName()})})
    .then(function(r){return r.json();})
    .then(function(d){return (d&&d.ok&&d.code)?("https://wya.to/r/"+d.code):longLink();})
    .catch(function(){return longLink();});
}
function message(link){
  var v=venueName()||"us", w=when.value.trim();
  return "Your table at "+v+(w?" for "+w:"")+" is confirmed 🎉\nNow round up your crew 👉 "+link;
}
function doCopy(text){
  try{return navigator.clipboard.writeText(text);}catch(e){}
  try{var t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}catch(_){}
  return Promise.resolve();
}
btn.addEventListener("click",function(){
  if(!guest.value.trim()){guest.focus();guest.style.boxShadow="0 0 0 3px var(--red)";setTimeout(function(){guest.style.boxShadow="";},1400);return;}
  btn.disabled=true;var o=btn.textContent;btn.textContent="Building…";
  shortLink().then(function(link){
    return doCopy(message(link));
  }).then(function(){
    btn.textContent="Copied ✓ — paste into your confirmation";
    setTimeout(function(){btn.disabled=false;btn.textContent=o;},2200);
  });
});
</script>
</body>
</html>
