# Netlify — serverless functions live here (publish dir left as configured in the Netlify UI)
[functions]
  directory = "netlify/functions"

# Pretty invite links: /i/<code> is served by the SSR function, which injects per-invite
# link-preview tags (host, vibe, when/where, card image) then returns the RSVP page.
[[redirects]]
  from = "/i/:code"
  to = "/.netlify/functions/invite-ssr?c=:code"
  status = 200
