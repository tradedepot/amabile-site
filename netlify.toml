# Netlify — serverless functions live here (publish dir left as configured in the Netlify UI)
[functions]
  directory = "netlify/functions"

# Pretty invite links /i/<code> are owned directly by the invite-ssr function
# (see `export const config = { path: "/i/:code" }` in netlify/functions/invite-ssr.mjs),
# which injects per-invite preview tags (host, vibe, when/where, card image).

# /venue is owned by the venue-ssr function (config.path "/venue"), which injects a
# venue-coded title ("Guest list — <venue>") then serves the static venue.html body.

# Clean shortcuts: /new, /pullup, /host all serve the homepage, which auto-opens the generator.
[[redirects]]
  from = "/new"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/pullup"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/host"
  to = "/index.html"
  status = 200
