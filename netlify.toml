# Netlify — serverless functions live here (publish dir left as configured in the Netlify UI)
[functions]
  directory = "netlify/functions"

# Pretty invite links /i/<code> are owned directly by the invite-ssr function
# (see `export const config = { path: "/i/:code" }` in netlify/functions/invite-ssr.mjs),
# which injects per-invite preview tags (host, vibe, when/where, card image).

# /venue is owned by the venue-ssr function (config.path "/venue"), which injects a
# venue-coded title ("Guest list — <venue>") then serves the static venue.html body.

# Short "join the community" bio links (adr.wine/ig, /fb, /tt) → the site's join section,
# skipping the age splash, each carrying its platform's UTM for attribution.
[[redirects]]
  from = "/join"
  to = "https://www.amabiledirosa.com/?utm_source=offline&utm_medium=campaign&utm_campaign=join&utm_content=join_community&join=1#join"
  status = 302
  force = true
[[redirects]]
  from = "/join-ig"
  to = "https://www.amabiledirosa.com/?utm_source=instagram&utm_medium=profile&utm_campaign=link_in_bio&utm_content=join_community&join=1#join"
  status = 302
  force = true
[[redirects]]
  from = "/join-fb"
  to = "https://www.amabiledirosa.com/?utm_source=facebook&utm_medium=profile&utm_campaign=link_in_bio&utm_content=join_community&join=1#join"
  status = 302
  force = true
[[redirects]]
  from = "/join-tt"
  to = "https://www.amabiledirosa.com/?utm_source=tiktok&utm_medium=profile&utm_campaign=link_in_bio&utm_content=join_community&join=1#join"
  status = 302
  force = true

# TikTok's single bio link → the homepage hub, tagged for TikTok.
[[redirects]]
  from = "/tt"
  to = "https://www.amabiledirosa.com/?utm_source=tiktok&utm_medium=profile&utm_campaign=link_in_bio&utm_content=bio_home"
  status = 302
  force = true

# Short "find a bottle" links (adr.wine/buy + per-platform) → the where-to-buy page, with UTMs.
[[redirects]]
  from = "/buy"
  to = "https://www.amabiledirosa.com/where-to-buy.html?utm_source=offline&utm_medium=campaign&utm_campaign=buy&utm_content=find_a_bottle"
  status = 302
  force = true
[[redirects]]
  from = "/buy-ig"
  to = "https://www.amabiledirosa.com/where-to-buy.html?utm_source=instagram&utm_medium=profile&utm_campaign=link_in_bio&utm_content=find_a_bottle"
  status = 302
  force = true
[[redirects]]
  from = "/buy-fb"
  to = "https://www.amabiledirosa.com/where-to-buy.html?utm_source=facebook&utm_medium=profile&utm_campaign=link_in_bio&utm_content=find_a_bottle"
  status = 302
  force = true
[[redirects]]
  from = "/buy-tt"
  to = "https://www.amabiledirosa.com/where-to-buy.html?utm_source=tiktok&utm_medium=profile&utm_campaign=link_in_bio&utm_content=find_a_bottle"
  status = 302
  force = true

# Clean shortcuts /new, /pullup, /host are owned by the generator-ssr function
# (config.path), which serves the homepage with a behaviour-led link preview
# ("Round up your crew") and auto-opens the generator on those paths.
